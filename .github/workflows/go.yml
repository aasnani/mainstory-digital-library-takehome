# Builds all packages and runs the full Go test suite (no external services required).

name: Build and test

on:
  pull_request:
    branches: [ "main" ]

jobs:

  build-and-test:
    name: Build and test (Go)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Compile all packages
      run: go build -v ./...

    - name: Run tests
      run: go test -v ./...
